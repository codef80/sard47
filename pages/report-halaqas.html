<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير الحلق التفصيلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="../css/reports.css"/>
</head>
<body>
<nav class="navbar-sard">
  <div class="navbar-brand"><i class="fas fa-quran"></i><span id="navTitle">تقرير الحلق التفصيلي</span></div>
  <div class="d-flex align-center gap-2">
    <button onclick="loadData()" class="btn-nav"><i class="fas fa-rotate"></i> تحديث</button>
    <a href="../index.html" class="nav-back"><i class="fas fa-arrow-right"></i> العودة</a>
  </div>
</nav>
<div class="page-wrap" id="app">
  <div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري تحميل التقرير...</span></div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/reports.js"></script>
<script>
var _D = null, _sel = '', _expandedStudents = {};

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري التحميل...</span></div>';
  try {
    const res = await loadReportData();
    _D = res.summary;
    document.getElementById('navTitle').textContent = 'تقرير الحلق التفصيلي — ' + res.complex.name;
    if (!_sel && _D.halaqas.length) _sel = _D.halaqas[0].name;
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="card-sard" style="text-align:center;padding:32px;color:var(--danger);"><i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:8px;display:block;"></i>خطأ: ${escH(e.message||String(e))}</div>`;
  }
}

function render() {
  if (!_D) return;
  const halaqa = _D.halaqas.find(h => h.name === _sel);
  const halaqaOpts = _D.halaqas.map(h => `<option value="${escH(h.name)}" ${_sel===h.name?'selected':''}>${escH(h.name)} (${h.studentCount} طالب)</option>`).join('');

  let html = `<div class="card-sard animate-in">
    <div class="d-flex justify-between align-center flex-wrap gap-2" style="margin-bottom:0;">
      <div class="card-title" style="margin-bottom:0;"><i class="fas fa-users-rectangle" style="color:var(--gold);"></i> تقرير تفصيلي بالمقاطع</div>
      <div class="section-tools">
        <select class="sard-select" onchange="selHalaqa(this.value)">${halaqaOpts}</select>
        <button class="btn-excel-sard" onclick="exportHalaqa()"><i class="fas fa-file-export"></i> تصدير CSV</button>
      </div>
    </div>
  </div>`;

  if (!halaqa) { html += '<div class="card-sard text-muted text-center" style="padding:40px;">اختر حلقة</div>'; document.getElementById('app').innerHTML = html; return; }

  // KPI الحلقة
  html += `<div class="grid-4 animate-in" style="margin-bottom:16px;">
    ${kpiCard('الطلاب',fN(halaqa.studentCount),'fa-users')}
    ${kpiCard('حاضر',fN(halaqa.present),'fa-check','green')}
    ${kpiCard('غائب',fN(halaqa.absent),'fa-times','red')}
    ${kpiCardBar('نسبة الاجتياز',halaqa.globalPercent,'fa-trophy')}
  </div>`;

  // جدول الطلاب مع زر التوسع
  const rows = halaqa.students.map((st, i) => {
    const sL = {present:'حاضر',late:'متأخر',excused:'معتذر',absent:'غائب'}[st.status]||'—';
    const sC = {present:'badge-pass',late:'badge-warn',excused:'badge-info',absent:'badge-fail'}[st.status]||'badge-prim';
    const expanded = !!_expandedStudents[st.id];
    const miniTable = expanded ? buildMiniTable(st.sections, st.eff.partsDivisions) : '';
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td>
        <div class="fw-bold">${escH(st.name)}</div>
        ${st.track?`<span class="badge-sard badge-gold" style="font-size:.7rem;">${escH(st.track)}</span>`:''}
      </td>
      <td><span class="badge-sard ${sC}">${sL}</span></td>
      <td>${fN(st.totalExpected)}</td>
      <td>${fN(st.displayed)}</td>
      <td style="color:var(--success);font-weight:700;">${fN(st.passed)}</td>
      <td style="color:var(--danger);">${fN(st.failed)}</td>
      <td>${fP(st.coveragePct)}%</td>
      <td style="font-weight:800;color:${st.studentPct>=70?'var(--success)':st.studentPct>=50?'var(--warning)':'var(--danger)'};">${fP(st.studentPct)}%</td>
      <td><span class="rank-badge ${rkCls(st.rank)}">${st.rank}</span></td>
      <td>
        <button class="subtab-btn" style="padding:4px 10px;font-size:.75rem;" onclick="toggleStudent('${st.id}')">
          <i class="fas fa-${expanded?'chevron-up':'table'}"></i> ${expanded?'إخفاء':'تفاصيل'}
        </button>
      </td>
    </tr>
    ${expanded?`<tr><td colspan="11" style="padding:0 12px 12px;background:var(--primary-lt);">${miniTable}</td></tr>`:''}`;
  }).join('');

  html += `<div class="card-sard animate-in">
    <div class="tbl-wrap"><table class="sard-table">
      <thead><tr><th>#</th><th>الطالب</th><th>الحضور</th><th>المفترض</th><th>المعروضة</th>
      <th>المجتازة</th><th>الرسوب</th><th>نسبة العرض</th><th>نسبة الطالب</th><th>الترتيب</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

function selHalaqa(name) { _sel = name; _expandedStudents = {}; render(); }

function toggleStudent(id) {
  _expandedStudents[id] = !_expandedStudents[id];
  render();
  setTimeout(() => {
    const rows = document.querySelectorAll('.sard-table tbody tr');
    for (const r of rows) { if (r.textContent.includes(id)) { r.scrollIntoView({behavior:'smooth',block:'center'}); break; } }
  }, 50);
}

function exportHalaqa() {
  const halaqa = _D.halaqas.find(h => h.name === _sel);
  if (!halaqa) return;
  const rows = [['الاسم','المسار','الحضور','المفترض','المعروضة','المجتازة','الرسوب','نسبة العرض','نسبة الطالب','الترتيب']];
  halaqa.students.forEach(s => rows.push([s.name, s.track||'—', s.status||'—', s.totalExpected, s.displayed, s.passed, s.failed, fP(s.coveragePct)+'%', fP(s.studentPct)+'%', s.rank]));
  exportCSV(rows, 'تقرير_' + (_sel||'') + '.csv');
}

loadData();
</script>
</body>
</html>
