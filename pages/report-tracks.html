<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير المسارات التفصيلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="../css/reports.css"/>
</head>
<body>
<nav class="navbar-sard">
  <div class="navbar-brand"><i class="fas fa-quran"></i><span id="navTitle">تقرير المسارات التفصيلي</span></div>
  <div class="d-flex align-center gap-2">
    <button onclick="loadData()" class="btn-nav"><i class="fas fa-rotate"></i> تحديث</button>
    <a href="../index.html" class="nav-back"><i class="fas fa-arrow-right"></i> العودة</a>
  </div>
</nav>
<div class="page-wrap" id="app">
  <div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري التحميل...</span></div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/reports.js"></script>
<script>
var _D = null, _sel = '', _expanded = {};

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="spinner-wrap animate-in"><div class="spinner"></div><span class="text-muted">جاري التحميل...</span></div>';
  try {
    const res = await loadReportData();
    _D = res.summary;
    document.getElementById('navTitle').textContent = 'تقرير المسارات — ' + res.complex.name;
    if (!_sel && _D.tracks.length) _sel = _D.tracks[0].name;
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="card-sard" style="text-align:center;padding:32px;color:var(--danger);">${escH(e.message)}</div>`;
  }
}

function render() {
  if (!_D) return;
  const track = _D.tracks.find(t => t.name === _sel);
  const trackOpts = _D.tracks.map(t=>`<option value="${escH(t.name)}" ${_sel===t.name?'selected':''}>${escH(t.name)} (${t.studentCount} طالب)</option>`).join('');

  // جدول المسارات الإجمالي
  const trackRows = _D.tracks.map((t,i) => `<tr onclick="selTrack('${t.name.replace(/'/g,"&#39;")}');_expanded={}" style="cursor:pointer;" class="${_sel===t.name?'row-sel':''}">
    <td>${i+1}</td><td><b>${escH(t.name)}</b></td>
    <td>${fN(t.studentCount)}</td><td>${fN(t.expectedParts)}</td><td>${fN(t.displayedParts)}</td>
    <td style="color:var(--success);font-weight:700;">${fN(t.passedParts)}</td>
    <td style="color:var(--danger);">${fN(t.failedParts)}</td>
    <td>${fP(t.coveragePercent)}%</td>
    <td style="font-weight:800;color:var(--primary);">${fP(t.globalPercent)}%</td>
    <td><span class="rank-badge ${rkCls(t.rank)}">${t.rank}</span></td>
  </tr>`).join('');

  // طلاب المسار المختار
  const students = track ? track.students : [];
  const stRows = students.map((st,i) => {
    const exp = !!_expanded[st.id];
    const miniT = exp ? buildMiniTable(st.sections, st.eff.partsDivisions) : '';
    return `<tr>
      <td>${i+1}</td>
      <td><div class="fw-bold">${escH(st.name)}</div><div class="text-muted" style="font-size:.75rem;">${escH(st.halaqa||'—')}</div></td>
      <td>${fN(st.totalExpected)}</td><td>${fN(st.displayed)}</td>
      <td style="color:var(--success);font-weight:700;">${fN(st.passed)}</td>
      <td style="color:var(--danger);">${fN(st.failed)}</td>
      <td>${fP(st.coveragePct)}%</td>
      <td style="font-weight:800;color:${st.studentPct>=70?'var(--success)':st.studentPct>=50?'var(--warning)':'var(--danger)'};">${fP(st.studentPct)}%</td>
      <td><span class="rank-badge ${rkCls(st.rank)}">${st.rank}</span></td>
      <td><button class="subtab-btn" style="padding:4px 10px;font-size:.75rem;" onclick="toggleSt('${st.id}')"><i class="fas fa-${exp?'chevron-up':'table'}"></i> ${exp?'إخفاء':'تفاصيل'}</button></td>
    </tr>
    ${exp?`<tr><td colspan="10" style="padding:0 12px 12px;background:var(--primary-lt);">${miniT}</td></tr>`:''}`;
  }).join('');

  document.getElementById('app').innerHTML =
    `<div class="card-sard animate-in">
      <div class="card-title"><i class="fas fa-diagram-project" style="color:var(--gold);"></i> تقرير المسارات الإجمالي</div>
      <div class="tbl-wrap"><table class="sard-table">
        <thead><tr><th>#</th><th>المسار</th><th>الطلاب</th><th>المفترض</th><th>المعروضة</th><th>المجتازة</th><th>الرسوب</th><th>نسبة العرض</th><th>النسبة العامة</th><th>الترتيب</th></tr></thead>
        <tbody>${trackRows}</tbody>
      </table></div>
    </div>

    <div class="card-sard animate-in">
      <div class="d-flex justify-between align-center flex-wrap gap-2" style="margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;"><i class="fas fa-user-graduate" style="color:var(--gold);"></i> طلاب المسار التفصيلي</div>
        <div class="section-tools">
          <select class="sard-select" onchange="selTrack(this.value);_expanded={};">${trackOpts}</select>
          <button class="btn-excel-sard" onclick="exportTrack()"><i class="fas fa-file-export"></i> تصدير CSV</button>
        </div>
      </div>
      ${track ? `<div class="grid-4" style="margin-bottom:16px;">
        ${kpiCard('الطلاب',fN(track.studentCount),'fa-users')}
        ${kpiCard('المجتازة',fN(track.passedParts),'fa-check','green')}
        ${kpiCard('الرسوب',fN(track.failedParts),'fa-times','red')}
        ${kpiCardBar('النسبة العامة',track.globalPercent,'fa-trophy')}
      </div>` : ''}
      <div class="tbl-wrap"><table class="sard-table">
        <thead><tr><th>#</th><th>الطالب</th><th>المفترض</th><th>المعروضة</th><th>المجتازة</th><th>الرسوب</th><th>نسبة العرض</th><th>نسبة الطالب</th><th>الترتيب</th><th></th></tr></thead>
        <tbody>${stRows || '<tr><td colspan="10" class="text-muted text-center" style="padding:24px;">اختر مساراً</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function selTrack(name) { _sel = name; _expanded = {}; render(); }
function toggleSt(id) { _expanded[id] = !_expanded[id]; render(); }
function exportTrack() {
  const track = _D.tracks.find(t=>t.name===_sel); if (!track) return;
  const rows = [['الاسم','الحلقة','المفترض','المعروضة','المجتازة','الرسوب','نسبة الطالب','الترتيب']];
  track.students.forEach(s=>rows.push([s.name,s.halaqa||'—',s.totalExpected,s.displayed,s.passed,s.failed,fP(s.studentPct)+'%',s.rank]));
  exportCSV(rows,'تقرير_مسار_'+(_sel||'')+'.csv');
}
loadData();
</script>
</body>
</html>
